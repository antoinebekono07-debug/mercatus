name = "myzone-store"
compatibility_date = "2024-12-01"
pages_build_output_dir = ".next"

[[d1_databases]]
binding = "DB"
database_name = "myzone-db"
database_id = "YOUR_DATABASE_ID_HERE"

[[r2_buckets]]
binding = "PRODUCT_IMAGES"
bucket_name = "myzone-products"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "products-embeddings"

[env.production.vars]
ENVIRONMENT = "production"

[env.staging.vars]
ENVIRONMENT = "staging"
